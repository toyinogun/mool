<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mool — Record your screen</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Mool</h1>
      <p class="tagline">Record your screen and share a link.</p>

      <div class="controls">
        <button id="start" class="primary" type="button">Start Recording</button>
        <button id="stop" type="button" disabled>Stop</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
      <p id="timer" class="timer"></p>

      <div id="result" hidden>
        <p>Share this link:</p>
        <a id="share-link" href="" target="_blank" rel="noopener"></a>
        <button id="copy" type="button">Copy link</button>
      </div>
    </main>
    <script src="/recorder.js"></script>
  </body>
</html>
