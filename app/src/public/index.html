<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mool — Record your screen</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="mool-header">
      <span class="mool-header-brand">Mool</span>
      <nav class="mool-header-nav">
        <a href="/library">Library</a>
        <span id="mool-user-display"></span>
        <form action="/auth/signout" method="post" class="mool-signout-form">
          <button type="submit">Sign out</button>
        </form>
      </nav>
    </header>
    <script type="module" src="/recorderHeader.js"></script>
    <main class="container">
      <h1>Mool</h1>
      <p class="tagline">Record your screen and share a link.</p>

      <div class="toggle-row">
        <label class="toggle-pill">
          <input type="checkbox" id="mic-enabled" checked />
          🎤 Mic on
        </label>
        <label class="toggle-pill">
          <input type="checkbox" id="cam-enabled" />
          📷 Camera on
        </label>
      </div>

      <div id="cam-preview-wrap" class="cam-preview-wrap" hidden>
        <video id="cam-preview" class="cam-preview" autoplay playsinline muted aria-label="Camera preview (mirrored)"></video>
        <button type="button" id="cam-preview-toggle" class="link-button">Hide preview</button>
      </div>

      <div id="cam-preview-hidden" class="cam-preview-hidden" hidden>
        <span>Camera on, preview hidden</span>
        <button type="button" id="cam-preview-show" class="link-button" aria-label="Show camera preview">Show</button>
      </div>

      <p id="cam-pip-note" class="note" hidden>
        Live camera overlay isn't supported in this browser. Recording still works; the camera will appear in the saved video.
      </p>

      <div class="controls">
        <button id="start" class="primary" type="button">Start Recording</button>
        <button id="stop" type="button" disabled>Stop</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
      <p id="timer" class="timer"></p>

      <div id="result" hidden>
        <p>Share this link:</p>
        <a id="share-link" href="" target="_blank" rel="noopener"></a>
        <button id="copy" type="button">Copy link</button>
      </div>
    </main>
    <script type="module" src="/recorder.js"></script>
  </body>
</html>
