services:
  app:
    build: ./app
    image: mool-app:latest
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      DATA_DIR: /data
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
