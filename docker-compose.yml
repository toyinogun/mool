services:
  app:
    build: ./app
    image: mool-app:latest
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      # Hard-code the in-container storage path (volume mount target) and
      # internal port (the target cloudflared connects to as app:3000).
      # User .env overrides for these don't make sense — they would break
      # the contract between this service and the rest of the stack.
      DATA_DIR: /data
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set in .env}
    depends_on:
      app:
        condition: service_healthy
